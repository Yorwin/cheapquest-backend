# CheapShark
cheapshark.base-url=https://www.cheapshark.com/api/1.0
cheapshark.timeout-seconds=10
cheapshark.retry.max-attempts=3
cheapshark.retry.base-delay-millis=1000

# RAWG
rawg.base-url=https://api.rawg.io/api
rawg.api-key=${RAWG_API_KEY}
rawg.timeout-seconds=10
rawg.retry.max-attempts=3
rawg.retry.base-delay-millis=1000

# DeepL: leave deepl.base-url blank to let the SDK auto-detect the
# endpoint from the API key suffix (":fx" -> free, no suffix -> pro).
# Override here only if you need to point at a custom proxy.
deepl.base-url=
deepl.api-key=${DEEPL_API_KEY}
deepl.batch-size=50

# Firebase
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH}
firestore.collection.games-path=games
firestore.collection.pending-path=pending
firestore.collection.failed-path=failed
firestore.collection.translation-pending-path=translations-pending
firestore.collection.translation-failed-path=translations-failed
firestore.collection.sections-path=sections
firestore.read-page-size=300

# Admin endpoint
admin.refresh.token=${ADMIN_REFRESH_TOKEN}
admin.refresh.port=8080
admin.refresh.interval-hours=6
admin.refresh.lock-ttl-minutes=10

# Multilingual
supported.languages=es,en,fr
translation.cache-ttl-days=30
translation.default-source=en

# Refresh
refresh.max-retries=3
refresh.failed-cooldown-days=7
refresh.deals-max-age-hours=24
refresh.rawg-max-age-days=180

# Pending queue: an entry whose lastAttemptAt is older than this
# gets its attempt counter reset on startup (recovery from a JVM
# crash mid-run). Default 60 minutes.
app.pending.stale-threshold-minutes=60
